background {
    monitor =
    path = ~/Downloads/wallpaper.webp   # <--- Vérifie bien le nom de ton image !
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
}

# L'HEURE (Géante)
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# LE CHAMP DE MOT DE PASSE
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Mot de passe...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
general {
    lock_cmd = pidof hyprlock || hyprlock       # Commande pour verrouiller
    before_sleep_cmd = loginctl lock-session    # Verrouille avant que le PC dorme
    after_sleep_cmd = hyprctl dispatch dpms on  # Rallume l'écran au réveil
}

listener {
    timeout = 300                                # 5 minutes
    on-timeout = loginctl lock-session           # Verrouille l'écran
}

listener {
    timeout = 330                                # 5 min 30 sec
    on-timeout = hyprctl dispatch dpms off       # Éteint l'écran (économie d'énergie)
    on-resume = hyprctl dispatch dpms on         # Rallume quand tu bouges la souris
}
monitor=,preferred,auto,1

exec-once = waybar
exec-once = swww-daemon
exec-once = swww img ~/Downloads/wallpaper.webp --transition-type center
exec-once = nm-applet --indicator
exec-once = nwg-dock-hyprland -i 30 -w 0 -p bottom -a center -mb 15 -d -c "wofi --show drun"
exec-once = blueman-applet
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,macOS
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct

input {
    kb_layout = fr
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(534AB7ff) rgba(1D9E75ff) 45deg
    col.inactive_border = rgba(44444188)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 15
    active_opacity = 0.95
    inactive_opacity = 0.85
    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
	ignore_opacity = true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = outBack, 0.34, 1.56, 0.64, 1

    animation = windows, 1, 6, outBack, slide
    animation = windowsIn, 1, 6, outBack, slide
    animation = windowsOut, 1, 5, fluent_decel, popin 80%

    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, fluent_decel, slidefade 20%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

gestures {
	workspace_swipe_distance = 300
	workspace_swipe_invert = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

bind = SUPER, Return, exec, kitty
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER, Q, killactive
bind = SUPER SHIFT, E, exit
bind = SUPER, B, exec, firefox
bind = SUPER, E, exec, thunar
bind = SUPER, F, fullscreen, 0
bind = SUPER, T, togglefloating
bind = SUPER, P, pseudo
bind = SUPER, S, togglesplit
bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = SUPER, L, exec, hyprlock

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

binde = SUPER ALT, right, resizeactive, 50 0
binde = SUPER ALT, left, resizeactive, -50 0
binde = SUPER ALT, up, resizeactive, 0 -50
binde = SUPER ALT, down, resizeactive, 0 50

bind = SUPER, ampersand, workspace, 1
bind = SUPER, eacute, workspace, 2
bind = SUPER, quotedbl, workspace, 3
bind = SUPER, apostrophe, workspace, 4
bind = SUPER, parenleft, workspace, 5
bind = SUPER, minus, workspace, 6
bind = SUPER, egrave, workspace, 7
bind = SUPER, underscore, workspace, 8
bind = SUPER, ccedilla, workspace, 9
bind = SUPER, agrave, workspace, 10

bind = SUPER SHIFT, ampersand, movetoworkspace, 1
bind = SUPER SHIFT, eacute, movetoworkspace, 2
bind = SUPER SHIFT, quotedbl, movetoworkspace, 3
bind = SUPER SHIFT, apostrophe, movetoworkspace, 4
bind = SUPER SHIFT, parenleft, movetoworkspace, 5
bind = SUPER SHIFT, minus, movetoworkspace, 6
bind = SUPER SHIFT, egrave, movetoworkspace, 7
bind = SUPER SHIFT, underscore, movetoworkspace, 8
bind = SUPER SHIFT, ccedilla, movetoworkspace, 9
bind = SUPER SHIFT, agrave, movetoworkspace, 10

bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SUPER, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

windowrulev2 = float, class:^(thunar)$, title:^(Copie|Déplacer|Propriétés)
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = center, class:^(wofi)$
windowrulev2 = noborder, class:^(wofi)$
windowrulev2 = size 800 500, class:^(wofi)$

layerrule = blur, nwg-dock-hyprland
layerrule = ignorealpha 0.5, nwg-dock-hyprland
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
layerrule = blur, waybar
layerrule = ignorealpha 0.3, waybar
